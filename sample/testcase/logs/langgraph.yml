      info:
        user: An IDPS can be connected to a GatewayECU. Here it is modeled as a centralized
          inline IDPS.
      left:
        asset: IDPS
        fieldname: idps
        max: 1
        min: 0
      name: IDPSProtection
      right:
        asset: GatewayECU
        fieldname: idpsGatewayECU
        max: 1
        min: 1
    trafficVNetworks:
      info: {}
      left:
        asset: VehicleNetwork
        fieldname: trafficVNetworks
        max: null
        min: 0
      name: GatewayConnection
