VehicularApplication:
  associations:
    assignedVehicularIdentity:
      info:
        user: Applications needs to be granted certain privileges when executing on
          a platform. When the application is compromised, the attacker gains its
          privileges on the platform.
      left:
        asset: VehicularIdentity
        fieldname: assignedVehicularIdentity
        max: null
        min: 0
      name: Assignment
      right:
        asset: VehicularApplication
        fieldname: assignedApplications
        max: null
        min: 0
    hostMachine:
      info: {}
      left:
        asset: Machine
        fieldname: hostMachine
        max: 1
        min: 0
      name: machineExecution
      right:
        asset: VehicularApplication
        fieldname: machineExecutedApps
        max: null
        min: 0
