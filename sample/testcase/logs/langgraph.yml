      own_parents:
        Application:fullAccess:
        - null
        Application:modify:
        - AppExecution:
            asset type: Application
            fieldname: hostApp
          type: field
        Application:modifyFromSoftProdVulnerability:
        - null
        Hardware:modify:
        - SysExecution:
            asset type: Hardware
            fieldname: hostHardware
          type: field
      tags:
      - hidden
      ttc: null
      type: or
    attemptModifyFromSoftProdVulnerability:
      asset: Application
      detectors: {}
      info:
        developer: Intermediate attack step to allow for defenses.
      inherits: null
      name: attemptModifyFromSoftProdVulnerability
      overrides: true
      own_children:
        Application:modifyFromSoftProdVulnerability:
        - null
      own_parents:
        SoftwareProduct:modifyApplications:
        - AppSoftwareProduct:
            asset type: SoftwareProduct
            fieldname: appSoftProduct
          type: field
      tags:
      - hidden
      ttc: null
      type: or
    attemptNetworkConnectFromResponse:
      asset: Application
      detectors: {}
      info:
        developer: Intermediate attack step to allow for defenses.
      inherits: null
      name: attemptNetworkConnectFromResponse
      overrides: true
      own_children:
        Application:networkConnectFromResponse:
        - null
      own_parents:
        Data:applicationRespondConnect:
        - SendData:
            asset type: Data
            fieldname: sentData
          type: field
      tags:
      - hidden
      ttc: null
      type: or
    attemptRead:
      asset: Application
      detectors: {}
      info:
        developer: Intermediate attack step to allow for defenses.
      inherits: null
      name: attemptRead
      overrides: true
      own_children:
        Application:successfulRead:
        - null
      own_parents:
        Application:fullAccess:
        - null
        Application:read:
        - AppExecution:
            asset type: Application
            fieldname: hostApp
          type: field
        Application:readFromSoftProdVulnerability:
        - null
        Hardware:read:
        - SysExecution:
